<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <title>Em Desenvolvimento</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .fa-infinity {
      font-size: 1em;

      background: linear-gradient(
        90deg,
        #ff0000,
        #ff9900,
        #ffee00,
        #33cc33,
        #0099ff,
        #9933ff
      );

      background-size: 100%;

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="container">
     
    <h1> <i class="fa-solid fa-infinity"></i> Site em desenvolvimento</h1>
    
  </div>
</body>
</html>
