<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Construção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="faixa-topo"></header>

    <main class="container">
        
        <div class="header-construcao">
            <h1>Estamos construindo este espaço</h1>
            <img src="losango.png" alt="Ícone de construção" class="img-losango">
        </div>

        <div class="texto-principal">
            <p>Em breve você encontrará aqui informações, materiais complementares e os resultados da pesquisa apresentados em nosso projeto.</p>
            <p class="destaque">Volte em breve para acompanhar as atualizações.</p>
        </div>

        <div class="ilustracao-container">
            <img src="brilho.png" alt="Brilho" class="img-brilho">
            <img src="menina.png" alt="Ilustração de uma menina lendo" class="img-menina">
        </div>

    </main>

</body>
</html>
